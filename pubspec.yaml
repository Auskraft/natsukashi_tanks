name: natsukashi_tanks
description: "Natsukashi Yoru — танки (Battle City-стиль). Отдельная игра под брендом Natsukashi Yoru."
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Игровой движок и сопутствующее (как в проекте-сборнике).
  flame: ^1.18.0
  flame_audio: ^2.10.2
  shared_preferences: ^2.3.2
  flutter_displaymode: ^0.6.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.0
  flutter_launcher_icons: ^0.14.1

# ── Иконка приложения (dart run flutter_launcher_icons) ──────────────────────
# Иконка/сплэш — кей-арт танков: tool/keyart_src.png → `python tool/make_icons.py`
# → assets/icon/icon.png (кроп на танк) + splash.png (полный арт). Затем
# `dart run flutter_launcher_icons` и `flutter_native_splash:create`.
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#000107"
  adaptive_icon_foreground: "assets/icon/icon.png"

# ── Сплэш-экран (dart run flutter_native_splash:create) ──────────────────────
flutter_native_splash:
  color: "#000107"
  image: assets/icon/splash.png
  android: true
  ios: false
  android_12:
    color: "#000107"
    image: assets/icon/blank.png
    icon_background_color: "#000107"

flutter:
  uses-material-design: true

  assets:
    - assets/icon/splash.png
    # Аудио-клипы фазы 6 (.wav, сгенерированы tool/gen_audio.py; манифест —
    # docs/AUDIO.md). Папка объявлена директорией — любые файлы внутри попадают
    # в сборку. Нет файла → звук no-op (core/audio/audio_manager.dart).
    - assets/audio/

  fonts:
    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk.ttf
